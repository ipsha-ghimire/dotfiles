#####monitor settings####
monitor=,preferred,auto,1
### MY PROGRAMS ###
$terminal = kitty
$menu = wofi --show drun
#################
### AUTOSTART ###
#################
exec-once = waybar
exec-once = hyprpaper
exec-once = hypridle
exec-once = mako
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = nm-applet --indicator
exec-once = gsettings set org.gnome.desktop.interface color-scheme prefer-dark
#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,24
env = GDK_BACKEND,wayland
env = QT_QPA_PLATFORM,wayland
env = ELECTRON_OZONE_PLATFORM_HINT,wayland
env = GTK_THEME,Gruvbox-Dark
#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(458588ee) rgba(d79921ee) 45deg
    col.inactive_border = rgba(3c3836aa)
    layout = dwindle
    resize_on_border = true
}
#####decorations settings####
decoration {
    rounding = 10

    blur {
        enabled = true
        size = 3
        passes = 2
        vibrancy = 0.1696
    }

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }
}
##animations settings##
animations {
    enabled = true

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}
#inpitut (keyboard and mouse) settings#
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = true
        disable_while_typing = true
        tap-to-click = true
    }
}
#keybindings settings#
####################
### KEYBINDINGS  ###
####################

$mod = SUPER

# Core
bind = $mod, Return, exec, $terminal
bind = $mod, D, exec, $menu
bind = $mod, Q, killactive
bind = $mod, F, fullscreen
bind = $mod, V, togglefloating
bind = $mod, E, exec, GTK_THEME=Gruvbox-Dark nautilus
bind = $mod, F1, exec, hyprlock

# Apps
bind = $mod, B, exec, google-chrome-stable
bind = $mod SHIFT, B, exec, brave-browser
bind = $mod SHIFT, D, exec, discord
bind = $mod, C, exec, code

# Focus movement (vim keys)
bind = $mod, H, movefocus, l
bind = $mod, J, movefocus, d
bind = $mod, K, movefocus, u
bind = $mod, L, movefocus, r
# Move windows around
bind = $mod SHIFT, H, movewindow, l
bind = $mod SHIFT, J, movewindow, d
bind = $mod SHIFT, K, movewindow, u
bind = $mod SHIFT, L, movewindow, r
# Resize windows
binde = $mod ALT, H, resizeactive, -30 0
binde = $mod ALT, J, resizeactive, 0 30
binde = $mod ALT, K, resizeactive, 0 -30
binde = $mod ALT, L, resizeactive, 30 0

# Workspaces switch
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9

# Move window to workspace
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9

# Cycle workspaces
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up, workspace, e-1
bind = $mod, Tab, workspace, e+1
bind = $mod SHIFT, Tab, workspace, e-1

# Move floating windows
bind = $mod, left, moveactive, -30 0
bind = $mod, right, moveactive, 30 0
bind = $mod, up, moveactive, 0 -30
bind = $mod, down, moveactive, 0 30

## Screenshot
bind = , Print, exec, grim - | wl-copy && notify-send "Screenshot copied"
bind = $mod SHIFT, S, exec, grim -g "$(slurp)" - | satty --filename -
bind = $mod, P, exec, grim - | wl-copy && notify-send "Screenshot copied"
# Clipboard history
bind = $mod SHIFT, V, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy

# Audio
bindel = , XF86AudioRaiseVolume, exec, pamixer -i 5
bindel = , XF86AudioLowerVolume, exec, pamixer -d 5
bindel = , XF86AudioMute, exec, pamixer -t
bindel = , XF86AudioMicMute, exec, pamixer --default-source -t

# Brightness
bindel = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Scratchpad
bind = $mod, grave, togglespecialworkspace, magic
bind = $mod SHIFT, grave, movetoworkspace, special:magic

# Reload and exit
bind = $mod SHIFT, R, exec, hyprctl reload
bind = $mod SHIFT, E, exit
bind = $mod SHIFT, Q, exec, hyprlock
## desktop entries###
bind = $mod, Y, exec, google-chrome-stable --profile-directory=Default --app=https://youtube.com
bind = $mod SHIFT, C, exec, google-chrome-stable --profile-directory=Default --app=https://claude.ai
bind = $mod SHIFT, G, exec, google-chrome-stable --profile-directory=Default --app=https://chatgpt.com
bind = $mod SHIFT, N, exec, google-chrome-stable --profile-directory=Default --app=https://notion.so
##############################
### WINDOWS AND WORKSPACES ###
##############################

windowrulev2 = workspace 1, class:^(kitty)$
windowrulev2 = workspace 2, class:^(google-chrome)$
windowrulev2 = workspace 3, class:^(code-oss)$
windowrulev2 = workspace 6, class:^(discord)$

windowrulev2 = float, class:^(pavucontrol)$
windowrulev2 = float, class:^(blueman-manager)$
windowrulev2 = float, title:^(Picture-in-Picture)$

windowrulev2 = size 800 600, class:^(pavucontrol)$
windowrulev2 = workspace 4, title:^(Notion)$
##########
### MISC #
##########

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
}
